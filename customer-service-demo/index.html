<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能客服小助手</title>
  <style>
    /* ============================================================
       Design Tokens — 所有颜色/字体/间距/圆角/阴影/动效均从此处取
       不在组件层硬编码任何值
    ============================================================ */
    :root {
      /* 主色 */
      --color-primary:          #1677FF;
      --color-primary-hover:    #0958D9;
      --color-primary-active:   #003EB3;
      --color-primary-disabled: #A8C8FF;

      /* 中性色 */
      --color-bg-page:    #F0F2F5;
      --color-bg-chat:    #FFFFFF;
      --color-bg-bot:     #F5F5F5;
      --color-bg-input:   #FFFFFF;

      --color-text-primary:    #1A1A1A;
      --color-text-secondary:  #8C8C8C;
      --color-text-on-primary: #FFFFFF;

      --color-border:       #E8E8E8;
      --color-border-focus: #1677FF;

      /* 语义色 */
      --color-online:    #52C41A;
      --color-error:     #FF4D4F;
      --color-error-bg:  #FFF2F0;

      /* 字体 */
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                     "PingFang SC", "Hiragino Sans GB",
                     "Microsoft YaHei", sans-serif;
      --font-size-lg: 16px;
      --font-size-md: 14px;
      --font-size-sm: 12px;
      --font-weight-regular: 400;
      --font-weight-medium:  500;
      --line-height-body: 1.6;
      --line-height-ui:   1.4;

      /* 间距（8pt 栅格） */
      --space-4:   4px;
      --space-8:   8px;
      --space-12:  12px;
      --space-16:  16px;
      --space-24:  24px;

      /* 圆角 */
      --radius-bubble: 12px;
      --radius-input:   8px;
      --radius-button:  8px;
      --radius-avatar: 50%;
      --radius-dot:    50%;

      /* 阴影 */
      --shadow-chat-window: 0 2px 16px rgba(0,0,0,0.08);
      --shadow-send-btn:    0 2px 4px  rgba(22,119,255,0.3);

      /* 动效 */
      --duration-instant:  0ms;
      --duration-fast:    150ms;
      --duration-normal:  250ms;
      --duration-typing:   60ms;
      --easing-standard:   cubic-bezier(0.4, 0, 0.2, 1);
      --easing-decelerate: cubic-bezier(0, 0, 0.2, 1);
    }

    /* ============================================================
       Reset & Base
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      color: var(--color-text-primary);
      background: var(--color-bg-page);
      -webkit-font-smoothing: antialiased;
    }

    /* ============================================================
       页面布局 — 居中容器，100vh 撑满
    ============================================================ */
    .page-wrapper {
      display: flex;
      justify-content: center;
      align-items: stretch;
      min-height: 100vh;
      padding: 0;
    }

    .chat-app {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 480px;
      height: 100vh;
      background: var(--color-bg-chat);
      box-shadow: var(--shadow-chat-window);
      position: relative;
    }

    /* ============================================================
       Header — 56px 固定顶部
    ============================================================ */
    .chat-header {
      flex-shrink: 0;
      height: 56px;
      background: var(--color-bg-chat);
      border-bottom: 1px solid var(--color-border);
      padding: 0 var(--space-24);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: var(--space-8);
    }

    /* 客服头像 */
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-avatar);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-medium);
      flex-shrink: 0;
      line-height: 1;
      user-select: none;
    }

    .avatar--bot {
      background: var(--color-bg-bot);
      color: var(--color-text-primary);
    }

    .avatar--user {
      background: var(--color-primary);
      color: var(--color-text-on-primary);
    }

    .header-brand {
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-medium);
      color: var(--color-text-primary);
      line-height: var(--line-height-ui);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }

    /* 在线绿点 — 颜色 + 文字双重传达，满足 WCAG 1.4.1 */
    .online-dot {
      width: 8px;
      height: 8px;
      background: var(--color-online);
      border-radius: var(--radius-dot);
      flex-shrink: 0;
    }

    .online-text {
      font-size: var(--font-size-sm);
      color: var(--color-online);
      line-height: var(--line-height-ui);
    }

    /* ============================================================
       Chat Window — 弹性高度，可滚动消息列表
    ============================================================ */
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-16);
      scroll-behavior: smooth;
      /* 自定义滚动条（Webkit） */
      scrollbar-width: thin;
      scrollbar-color: #D9D9D9 transparent;
    }

    .chat-window::-webkit-scrollbar {
      width: 4px;
    }

    .chat-window::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-window::-webkit-scrollbar-thumb {
      background: #D9D9D9;
      border-radius: 2px;
    }

    .chat-window::-webkit-scrollbar-thumb:hover {
      background: #BFBFBF;
    }

    /* ============================================================
       消息行 — 用户 / 客服 / 系统
    ============================================================ */
    .message-row {
      display: flex;
      align-items: flex-start;
      margin-bottom: var(--space-16);
      /* 气泡入场动画 */
      animation: bubbleIn var(--duration-normal) var(--easing-decelerate) both;
    }

    /* 相邻同侧消息缩减间距（视觉分组） */
    .message-row + .message-row.same-side {
      margin-top: calc(-1 * var(--space-12));
    }

    /* 用户消息：右对齐 */
    .message-row--user {
      flex-direction: row-reverse;
    }

    /* 客服消息：左对齐（默认） */
    .message-row--bot {
      flex-direction: row;
    }

    /* 气泡入场动画 */
    @keyframes bubbleIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 头像与气泡间距 */
    .message-row--user .avatar {
      margin-left: var(--space-8);
    }

    .message-row--bot .avatar {
      margin-right: var(--space-8);
    }

    /* ============================================================
       气泡 — 方向性圆角规则
    ============================================================ */
    .bubble {
      max-width: 72%;
      padding: var(--space-8) var(--space-12);
      font-size: var(--font-size-md);
      line-height: var(--line-height-body);
      word-break: break-word;
      white-space: pre-wrap; /* 保留换行符 */
    }

    /* 用户气泡：右上角 2px，指向右侧 */
    .bubble--user {
      background: var(--color-primary);
      color: var(--color-text-on-primary);
      border-radius: var(--radius-bubble) 2px var(--radius-bubble) var(--radius-bubble);
    }

    /* 客服气泡：左上角 2px，指向左侧 */
    .bubble--bot {
      background: var(--color-bg-bot);
      color: var(--color-text-primary);
      border-radius: 2px var(--radius-bubble) var(--radius-bubble) var(--radius-bubble);
    }

    /* 错误气泡：⚠ 前缀 + 红色边框背景 */
    .bubble--error {
      background: var(--color-error-bg);
      color: var(--color-error);
      border: 1px solid #FFCCC7;
      border-radius: 2px var(--radius-bubble) var(--radius-bubble) var(--radius-bubble);
    }

    /* ============================================================
       打字指示器 — 三点弹跳动画
    ============================================================ */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: 12px 16px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: var(--color-text-secondary);
      border-radius: 50%;
      animation: typingBounce 1s infinite;
    }

    .typing-dot:nth-child(1) { animation-delay: 0ms; }
    .typing-dot:nth-child(2) { animation-delay: 160ms; }
    .typing-dot:nth-child(3) { animation-delay: 320ms; }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* ============================================================
       输入区 — 64px 固定底部
    ============================================================ */
    .chat-input-area {
      flex-shrink: 0;
      height: 64px;
      background: var(--color-bg-input);
      border-top: 1px solid var(--color-border);
      padding: 0 var(--space-16);
      display: flex;
      align-items: center;
      gap: var(--space-8);
    }

    /* 输入框 */
    .chat-textarea {
      flex: 1;
      height: 40px;
      padding: var(--space-8) var(--space-12);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-input);
      font-size: var(--font-size-md);
      font-family: var(--font-family);
      background: var(--color-bg-input);
      color: var(--color-text-primary);
      outline: none;
      resize: none;
      overflow: hidden;
      line-height: var(--line-height-body);
      transition: border-color var(--duration-fast) ease,
                  box-shadow var(--duration-fast) ease;
    }

    .chat-textarea::placeholder {
      color: var(--color-text-secondary);
    }

    /* Focus 态 */
    .chat-textarea:focus {
      border-color: var(--color-border-focus);
      box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.15);
    }

    /* 发送中：输入框轻微变灰，禁止交互 */
    .chat-textarea.is-sending {
      background: #FAFAFA;
      pointer-events: none;
    }

    /* 错误态：shake 动画 */
    .chat-textarea.is-error {
      border-color: var(--color-error);
      animation: shakeInput 400ms ease-in-out;
    }

    @keyframes shakeInput {
      0%,  100% { transform: translateX(0); }
      20%        { transform: translateX(-6px); }
      40%        { transform: translateX(6px); }
      60%        { transform: translateX(-4px); }
      80%        { transform: translateX(4px); }
    }

    /* 发送按钮 */
    .send-btn {
      width: 64px;
      height: 40px;
      border: none;
      border-radius: var(--radius-button);
      background: var(--color-primary);
      color: var(--color-text-on-primary);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-medium);
      font-family: var(--font-family);
      cursor: pointer;
      box-shadow: var(--shadow-send-btn);
      transition: background var(--duration-fast) var(--easing-standard),
                  box-shadow var(--duration-fast) var(--easing-standard);
      /* 扩展触控区至 44×44pt */
      padding: 2px 0;
      line-height: var(--line-height-ui);
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) {
      background: var(--color-primary-hover);
    }

    .send-btn:active:not(:disabled) {
      background: var(--color-primary-active);
    }

    /* Focus 可见性 */
    .send-btn:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
    }

    /* Disabled 态 — cursor + 颜色 + pointer-events 三重信号 */
    .send-btn:disabled,
    .send-btn[aria-disabled="true"] {
      background: var(--color-primary-disabled);
      box-shadow: none;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* ============================================================
       Footer
    ============================================================ */
    .chat-footer {
      flex-shrink: 0;
      padding: var(--space-4) 0 var(--space-8);
      text-align: center;
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      background: var(--color-bg-chat);
      line-height: var(--line-height-ui);
    }

    /* ============================================================
       欢迎消息淡入（页面加载 300ms 延迟）
    ============================================================ */
    .welcome-message {
      animation: welcomeFadeIn var(--duration-normal) var(--easing-decelerate) 300ms both;
    }

    @keyframes welcomeFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="page-wrapper">
  <div class="chat-app">

    <!-- ── Header ── -->
    <header class="chat-header" role="banner">
      <div class="header-left">
        <div class="avatar avatar--bot" aria-hidden="true">客</div>
        <span class="header-brand">智能客服小助手</span>
      </div>
      <div class="header-right" aria-label="客服状态：在线">
        <div class="online-dot" aria-hidden="true"></div>
        <span class="online-text">在线</span>
      </div>
    </header>

    <!-- ── Chat Window ── -->
    <!--
      role="log"：表示此区域是实时更新的消息日志
      aria-live="polite"：新消息追加时，屏幕阅读器在合适时机播报
      aria-label：为辅助技术提供区域描述
    -->
    <main
      class="chat-window"
      id="chatWindow"
      role="log"
      aria-live="polite"
      aria-label="对话记录"
      aria-relevant="additions"
    ></main>

    <!-- ── 输入区 ── -->
    <footer class="chat-input-area" role="contentinfo">
      <textarea
        class="chat-textarea"
        id="messageInput"
        rows="1"
        placeholder="请输入您的问题…"
        aria-label="输入消息"
        aria-multiline="false"
      ></textarea>
      <button
        class="send-btn"
        id="sendBtn"
        disabled
        aria-label="发送消息"
        aria-disabled="true"
      >发送</button>
    </footer>

    <!-- ── Footer ── -->
    <div class="chat-footer" aria-hidden="true">Powered by AI</div>

  </div>
</div>

<script>
  /* ============================================================
     模拟回复规则
     R01 PRD §4 原文照搬，优先级从上到下
     ── 替换此处接入真实 API：将 getAIReply() 改为 fetch 调用 ──
  ============================================================ */
  const REPLY_RULES = [
    {
      keywords: ["退款", "退货"],
      reply: "您好，退款申请一般在3个工作日内处理，请提供订单号，我来帮您查询。"
    },
    {
      keywords: ["发货", "物流", "快递"],
      reply: "您的订单已发货，物流信息会在24小时内更新，请稍候查看。"
    },
    {
      keywords: ["优惠", "折扣", "券"],
      reply: "目前平台有满减活动，可在首页查看最新优惠信息。"
    },
    {
      keywords: ["人工", "转人工"],
      reply: "正在为您转接人工客服，预计等待时间2分钟，请稍候。"
    },
    {
      keywords: ["你好", "您好", "hi", "hello"],
      reply: "您好！我是智能客服小助手，请问有什么可以帮您？"
    },
    {
      keywords: ["谢谢", "感谢"],
      reply: "不客气，如有其他问题随时告诉我！"
    }
  ];

  const FALLBACK_REPLY = "感谢您的提问，我已记录您的问题，稍后会有专员跟进处理。请问还有其他需要帮助的吗？";

  /**
   * getAIReply — 当前用关键词规则匹配实现
   * ── 替换此处接入真实 API ──
   * 例：
   *   const res = await fetch('/api/chat', { method:'POST', body: JSON.stringify({ message }) });
   *   const data = await res.json();
   *   return data.reply;
   *
   * @param {string} userMessage 用户输入的消息
   * @returns {Promise<string>} 客服回复文本
   */
  async function getAIReply(userMessage) {
    const text = userMessage.toLowerCase();
    for (const rule of REPLY_RULES) {
      if (rule.keywords.some(kw => text.includes(kw.toLowerCase()))) {
        return rule.reply;
      }
    }
    return FALLBACK_REPLY;
  }

  /* ============================================================
     DOM 引用
  ============================================================ */
  const chatWindow  = document.getElementById("chatWindow");
  const messageInput = document.getElementById("messageInput");
  const sendBtn     = document.getElementById("sendBtn");

  /* ============================================================
     状态机
     IDLE → HAS_INPUT → SENDING → TYPING → IDLE
  ============================================================ */
  let appState = "IDLE"; // "IDLE" | "HAS_INPUT" | "SENDING" | "TYPING"

  /* ============================================================
     工具函数：滚动到底部
  ============================================================ */
  function scrollToBottom() {
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  /* ============================================================
     工具函数：获取当前时间字符串（可选展示，此处不展示时间戳以保持简洁）
  ============================================================ */
  // function getTimeString() {
  //   return new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
  // }

  /* ============================================================
     追加用户消息气泡
  ============================================================ */
  function appendUserMessage(text) {
    const row = document.createElement("div");
    row.className = "message-row message-row--user";
    row.innerHTML = `
      <div class="avatar avatar--user" aria-hidden="true">我</div>
      <div class="bubble bubble--user">${escapeHtml(text)}</div>
    `;
    chatWindow.appendChild(row);
    scrollToBottom();
  }

  /* ============================================================
     追加打字指示器（客服正在输入…）
     返回 row 元素，方便后续替换为真实气泡
  ============================================================ */
  function appendTypingIndicator() {
    const row = document.createElement("div");
    row.className = "message-row message-row--bot";
    row.id = "typingRow";
    row.setAttribute("aria-label", "客服正在输入");
    row.innerHTML = `
      <div class="avatar avatar--bot" aria-hidden="true">客</div>
      <div class="bubble bubble--bot typing-indicator" aria-hidden="true">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>
    `;
    chatWindow.appendChild(row);
    scrollToBottom();
    return row;
  }

  /* ============================================================
     移除打字指示器
  ============================================================ */
  function removeTypingIndicator() {
    const row = document.getElementById("typingRow");
    if (row) row.remove();
  }

  /* ============================================================
     打字机效果：逐字追加，每字 60ms ± 随机抖动
     返回 Promise，完成后 resolve
  ============================================================ */
  function typewriterEffect(bubbleEl, text) {
    return new Promise(resolve => {
      let index = 0;
      function typeNext() {
        if (index < text.length) {
          // 保留换行符，其余字符转义后追加
          const char = text[index];
          if (char === "\n") {
            bubbleEl.appendChild(document.createTextNode("\n"));
          } else {
            bubbleEl.appendChild(document.createTextNode(char));
          }
          index++;
          scrollToBottom(); // 每字追加后滚动到底
          // 60ms 基准 ± 最多 20ms 随机抖动，更自然
          const delay = 60 + Math.floor(Math.random() * 20) - 10;
          setTimeout(typeNext, delay);
        } else {
          resolve();
        }
      }
      typeNext();
    });
  }

  /* ============================================================
     追加客服消息气泡（打字机效果）
  ============================================================ */
  async function appendBotMessage(text) {
    const row = document.createElement("div");
    row.className = "message-row message-row--bot";

    const avatar = document.createElement("div");
    avatar.className = "avatar avatar--bot";
    avatar.setAttribute("aria-hidden", "true");
    avatar.textContent = "客";

    const bubble = document.createElement("div");
    bubble.className = "bubble bubble--bot";

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatWindow.appendChild(row);
    scrollToBottom();

    // 打字机逐字输出
    await typewriterEffect(bubble, text);
  }

  /* ============================================================
     追加错误气泡（getAIReply 抛出异常时触发）
  ============================================================ */
  function appendErrorMessage() {
    const row = document.createElement("div");
    row.className = "message-row message-row--bot";
    row.innerHTML = `
      <div class="avatar avatar--bot" aria-hidden="true">客</div>
      <div class="bubble bubble--error" role="alert">⚠ 抱歉，回复失败，请稍后重试</div>
    `;
    chatWindow.appendChild(row);
    scrollToBottom();
  }

  /* ============================================================
     HTML 转义 — 防止 XSS（用户输入不可信）
  ============================================================ */
  function escapeHtml(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  /* ============================================================
     输入框内容变化 → 控制发送按钮 enabled/disabled
  ============================================================ */
  messageInput.addEventListener("input", () => {
    const hasContent = messageInput.value.trim().length > 0;
    sendBtn.disabled = !hasContent;
    sendBtn.setAttribute("aria-disabled", String(!hasContent));
    appState = hasContent ? "HAS_INPUT" : "IDLE";
  });

  /* ============================================================
     Enter 发送 / Shift+Enter 换行
  ============================================================ */
  messageInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (appState === "HAS_INPUT") {
        handleSend();
      } else if (appState === "IDLE") {
        // 空输入按回车：触发 shake 动画
        triggerShake();
      }
    }
  });

  /* ============================================================
     发送按钮点击
  ============================================================ */
  sendBtn.addEventListener("click", () => {
    if (appState === "HAS_INPUT") {
      handleSend();
    }
  });

  /* ============================================================
     空输入错误提示：shake 动画
  ============================================================ */
  function triggerShake() {
    messageInput.classList.remove("is-error"); // 先移除，确保动画可重复触发
    // 强制 reflow，让浏览器重新计算样式，使动画能重复播放
    void messageInput.offsetWidth;
    messageInput.classList.add("is-error");
    // 动画结束后移除 class，恢复边框颜色
    messageInput.addEventListener("animationend", () => {
      messageInput.classList.remove("is-error");
    }, { once: true });
  }

  /* ============================================================
     核心发送流程
     状态机：HAS_INPUT → SENDING → TYPING → IDLE
  ============================================================ */
  async function handleSend() {
    const text = messageInput.value.trim();
    if (!text) return; // 防御性检查

    // ── SENDING 状态 ──
    appState = "SENDING";
    messageInput.value = "";
    messageInput.classList.add("is-sending");
    sendBtn.disabled = true;
    sendBtn.setAttribute("aria-disabled", "true");

    // 立即追加用户消息气泡
    appendUserMessage(text);

    // 随机延迟 600~1200ms，模拟真实感
    const delay = 600 + Math.floor(Math.random() * 600);
    await sleep(delay);

    // 显示打字指示器
    appendTypingIndicator();

    // ── TYPING 状态 ──
    appState = "TYPING";

    let replyText;
    try {
      replyText = await getAIReply(text);
    } catch (err) {
      // getAIReply 抛出异常（真实 API 接入后可能发生）
      console.error("[客服 Demo] getAIReply 异常:", err);
      removeTypingIndicator();
      appendErrorMessage();
      resetToIdle();
      return;
    }

    // 移除打字指示器，开始打字机输出
    removeTypingIndicator();
    await appendBotMessage(replyText);

    // ── 回到 IDLE ──
    resetToIdle();
  }

  /* ============================================================
     重置到 IDLE 状态
  ============================================================ */
  function resetToIdle() {
    appState = "IDLE";
    messageInput.classList.remove("is-sending");
    // 输入框已清空，按钮保持 disabled
    sendBtn.disabled = true;
    sendBtn.setAttribute("aria-disabled", "true");
    // 打字完成后自动 focus 输入框
    messageInput.focus();
  }

  /* ============================================================
     工具函数：Promise 版 setTimeout
  ============================================================ */
  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  /* ============================================================
     页面初始化：注入欢迎消息（空态处理）
     延迟 300ms 出现，opacity 0→1
  ============================================================ */
  function initWelcomeMessage() {
    const row = document.createElement("div");
    row.className = "message-row message-row--bot welcome-message";
    row.innerHTML = `
      <div class="avatar avatar--bot" aria-hidden="true">客</div>
      <div class="bubble bubble--bot">您好！我是智能客服小助手，有什么可以帮您？</div>
    `;
    chatWindow.appendChild(row);
    scrollToBottom();
  }

  // 页面加载完成后初始化
  initWelcomeMessage();
  // 自动聚焦输入框，方便用户直接打字
  messageInput.focus();
</script>

</body>
</html>
